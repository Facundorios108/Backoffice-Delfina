<body class="bg-background-light text-text-main font-display selection:bg-pink-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Utils para fechas ---
        const getLocalDateISO = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            return new Date(now.getTime() - offset).toISOString().split('T')[0];
        };

        const getMonthKey = (dateObj) => `${dateObj.getFullYear()}-${dateObj.getMonth()}`;

        // --- Mock Data para Seed ---
        const INITIAL_STOCK_DATA = [
            { name: 'Musculosa', collection: "Básicos", category: 'blanco', price: 15000, stock: { s: 12, m: 8, l: 5, xl: 2 } },
            { name: 'Musculosa', collection: "Básicos", category: 'negro', price: 15000, stock: { s: 15, m: 2, l: 0, xl: 0 } },
            { name: 'Musculosa', collection: "Temporada", category: 'chocolate', price: 16500, stock: { s: 5, m: 5, l: 5, xl: 5 } },
        ];

        const TRANSACTION_CATEGORIES = [
            { id: 'musculosas', name: 'Musculosas', icon: 'checkroom' },
            { id: 'remeras', name: 'Boxy fit', icon: 'storefront' },
            { id: 'manga_corta', name: 'Manga corta', icon: 'checkroom' },
            { id: 'merceria', name: 'Mercería', icon: 'shopping_bag' },
            { id: 'online', name: 'Venta Online', icon: 'shopping_cart' },
            { id: 'logistica', name: 'Logística', icon: 'local_shipping' },
            { id: 'marketing', name: 'Marketing', icon: 'campaign' },
        ];

        const PAYMENT_METHODS = [
            { id: 'transferencia', name: 'Transferencia', icon: 'account_balance' },
            { id: 'efectivo', name: 'Efectivo', icon: 'payments' },
            { id: 'tarjeta', name: 'Tarjeta', icon: 'credit_card' },
        ];

        const PRODUCT_TYPES = [
            { id: 'musculosa', name: 'Musculosa' },
            { id: 'remera', name: 'Boxy fit' },
            { id: 'manga_corta', name: 'Manga corta' },
        ];

        const MUSCULOSA_DESIGNS = [
            { id: 'aceitunas', name: 'Aceitunas' },
            { id: 'concha_de_mar', name: 'Concha de mar' },
            { id: 'libelula', name: 'Libélula' },
            { id: 'limon', name: 'Limón' },
            { id: 'medusa', name: 'Medusa' },
            { id: 'ojo_negro', name: 'Ojo negro' },
            { id: 'pimiento', name: 'Pimiento' },
            { id: 'saturno_azul', name: 'Saturno azul' },
            { id: 'saturno_dorado', name: 'Saturno dorado' },
            { id: 'otro', name: 'Otro' },
        ];

        const MUSCULOSA_COLORS = [
            { id: 'azul', name: 'Azul' },
            { id: 'blanco', name: 'Blanco' },
            { id: 'chocolate', name: 'Chocolate' },
            { id: 'gris_petroleo', name: 'Gris Petróleo' },
            { id: 'negro', name: 'Negro' },
            { id: 'verde', name: 'Verde' },
        ];

        const MUSCULOSA_SIZES = [
            { id: 's', name: 'S' },
            { id: 'm', name: 'M' },
            { id: 'l', name: 'L' },
            { id: 'xl', name: 'XL' },
        ];

        const STOCK_CATEGORIES = [
            { id: 'azul', name: 'Azul', colorCode: 'bg-blue-500' },
            { id: 'blanco', name: 'Blanco', colorCode: 'bg-white border border-gray-200' },
            { id: 'chocolate', name: 'Chocolate', colorCode: 'bg-[#7B3F00]' },
            { id: 'gris_petroleo', name: 'Gris Petróleo', colorCode: 'bg-gray-700' },
            { id: 'negro', name: 'Negro', colorCode: 'bg-black' },
            { id: 'verde', name: 'Verde', colorCode: 'bg-green-600' },
        ];

        // --- Componente Principal ---
        function App() {
            const [user, setUser] = useState(null);
            const [transactions, setTransactions] = useState([]);
            const [stockItems, setStockItems] = useState([]);
            const [stockHistory, setStockHistory] = useState([]);
            const [productionTasks, setProductionTasks] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [initialTxFilters, setInitialTxFilters] = useState({ type: 'all', date: 'all' });
            const [isLoading, setIsLoading] = useState(true);

            // Modales separados
            const [showTransactionModal, setShowTransactionModal] = useState(false);
            const [showStockModal, setShowStockModal] = useState(false);
            const [showAnalyticsModal, setShowAnalyticsModal] = useState(false);
            const [showStockHistoryModal, setShowStockHistoryModal] = useState(false);
            const [showProductionTasksModal, setShowProductionTasksModal] = useState(false);
            const [editingTransaction, setEditingTransaction] = useState(null);
            const [editingStock, setEditingStock] = useState(null);

            const hasSeededRef = useRef(false);

            // 1. Efecto de Autenticación
            useEffect(() => {
                console.log('🔐 Iniciando proceso de autenticación...');
                const checkFirebase = setInterval(() => {
                    if (window.firebaseData) {
                        clearInterval(checkFirebase);
                        console.log('✅ Firebase inicializado');
                        const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.firebaseData;

                        const initAuth = async () => {
                            try {
                                console.log('🔑 Intentando autenticación...');
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    console.log('🎫 Usando token personalizado');
                                    await signInWithCustomToken(auth, __initial_auth_token);
                                } else {
                                    console.log('👤 Usando autenticación anónima');
                                    const result = await signInAnonymously(auth);
                                    console.log('✅ Autenticación anónima exitosa:', result.user.uid);
                                }
                            } catch (error) {
                                console.error("❌ Error en auth:", error.code, error.message);
                                // Fallback a anónimo si falla el token custom (común en despliegue manual)
                                try {
                                    console.log('🔄 Reintentando con auth anónimo...');
                                    const result = await signInAnonymously(auth);
                                    console.log('✅ Fallback exitoso:', result.user.uid);
                                } catch (e) {
                                    console.error("❌ Auth anónimo falló:", e.code, e.message);
                                    alert('Error de autenticación: ' + e.message + '. Verifica tu conexión a internet y recarga la página.');
                                }
                            }
                        };

                        initAuth();
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                console.log('👤 Usuario autenticado:', u.uid);
                            } else {
                                console.log('⚠️ Sin usuario autenticado');
                            }
                            setUser(u);
                            if (!u) {
                                setTransactions([]);
                                setStockItems([]);
                                setIsLoading(false);
                            }
                        });
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            // 2. Efecto de Base de Datos
            useEffect(() => {
                if (!user || !window.firebaseData) return;
                const { db, appId, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp } = window.firebaseData;

                const qTx = query(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), orderBy('createdAt', 'desc'));
                const unsubTx = onSnapshot(qTx, (snapshot) => {
                    const txs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    txs.sort((a, b) => {
                        const dateA = a.createdAt?.seconds ? new Date(a.createdAt.seconds * 1000) : new Date(a.fullDate);
                        const dateB = b.createdAt?.seconds ? new Date(b.createdAt.seconds * 1000) : new Date(b.fullDate);
                        return dateB - dateA;
                    });
                    setTransactions(txs);
                }, (e) => console.error("Error txs:", e));

                const qStock = query(collection(db, 'artifacts', appId, 'users', user.uid, 'stock'), orderBy('name', 'asc'));
                const unsubStock = onSnapshot(qStock, async (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    if (items.length === 0 && !hasSeededRef.current) {
                        hasSeededRef.current = true;
                        // Solo hacer seed si estamos seguros de que es la primera vez real y no un error de carga
                        // Para producción a veces es mejor dejar vacío, pero aquí ayudamos con datos iniciales
                        /* const collectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'stock');
                        for (const item of INITIAL_STOCK_DATA) {
                            await addDoc(collectionRef, { ...item, createdAt: serverTimestamp() });
                        }
                        */
                        setStockItems([]); // Inicia vacío en producción para no ensuciar
                    } else {
                        setStockItems(items);
                    }
                    setIsLoading(false);
                }, (e) => console.error("Error stock:", e));

                // Suscripción al historial de stock
                const qHistory = query(collection(db, 'artifacts', appId, 'users', user.uid, 'stockHistory'), orderBy('createdAt', 'desc'));
                const unsubHistory = onSnapshot(qHistory, (snapshot) => {
                    const history = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStockHistory(history);
                }, (e) => console.error("Error history:", e));

                // Suscripción a tareas de producción
                const qTasks = query(collection(db, 'artifacts', appId, 'users', user.uid, 'productionTasks'), orderBy('createdAt', 'desc'));
                const unsubTasks = onSnapshot(qTasks, (snapshot) => {
                    const tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProductionTasks(tasks);
                }, (e) => console.error("Error tasks:", e));

                return () => { unsubTx(); unsubStock(); unsubHistory(); unsubTasks(); };
            }, [user]);

            // --- CÁLCULOS FINANCIEROS ---
            const financialStats = useMemo(() => {
                const now = new Date();
                const currentMonthKey = getMonthKey(now);
                const prevMonthDate = new Date();
                prevMonthDate.setMonth(now.getMonth() - 1);
                const prevMonthKey = getMonthKey(prevMonthDate);

                let currentIncome = 0; let currentExpense = 0;
                let prevIncome = 0; let prevExpense = 0;
                let totalBalance = 0;

                transactions.forEach(tx => {
                    const dateStr = tx.fullDate ? tx.fullDate : getLocalDateISO();
                    const [year, month, day] = dateStr.split('-').map(Number);
                    const txDate = new Date(year, month - 1, day);
                    const txMonthKey = getMonthKey(txDate);
                    const amount = parseFloat(tx.amount) || 0;

                    if (tx.type === 'income') totalBalance += amount;
                    else totalBalance -= amount;

                    if (txMonthKey === currentMonthKey) {
                        if (tx.type === 'income') currentIncome += amount; else currentExpense += amount;
                    } else if (txMonthKey === prevMonthKey) {
                        if (tx.type === 'income') prevIncome += amount; else prevExpense += amount;
                    }
                });

                const calculateGrowth = (current, previous) => {
                    if (previous === 0) return current > 0 ? 100 : 0;
                    return ((current - previous) / previous) * 100;
                };

                const incomeGrowth = calculateGrowth(currentIncome, prevIncome);
                const expenseGrowth = calculateGrowth(currentExpense, prevExpense);
                const balanceGrowth = calculateGrowth(currentIncome - currentExpense, prevIncome - prevExpense);

                return {
                    totalBalance, currentIncome, currentExpense,
                    incomeGrowth: incomeGrowth.toFixed(1),
                    expenseGrowth: expenseGrowth.toFixed(1),
                    balanceGrowth: balanceGrowth.toFixed(1),
                    isIncomeUp: incomeGrowth >= 0,
                    isExpenseUp: expenseGrowth > 0,
                    isBalanceUp: balanceGrowth >= 0
                };
            }, [transactions]);

            // --- STOCK SYNC HELPERS ---
            const revertStockAndTasks = async (tx) => {
                if (tx.category !== 'online' || !tx.products) return;
                const { db, appId, collection, getDocs, query, where, deleteDoc, updateDoc, doc, addDoc, serverTimestamp } = window.firebaseData;
                
                console.log('🔄 Revirtiendo stock y tareas para la transacción:', tx.id);

                // 1. Eliminar tareas de producción
                try {
                    const tasksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'productionTasks');
                    const q = query(tasksRef, where('transactionId', '==', tx.id));
                    const snapshot = await getDocs(q);
                    for (const taskDoc of snapshot.docs) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'productionTasks', taskDoc.id));
                    }
                    console.log(`✅ ${snapshot.size} tareas eliminadas`);
                } catch (err) {
                    console.error('❌ Error al eliminar tareas:', err);
                }

                // 2. Devolver stock
                try {
                    const stockRef = collection(db, 'artifacts', appId, 'users', user.uid, 'stock');
                    const stockSnapshot = await getDocs(stockRef);
                    
                    for (const product of tx.products) {
                        const productTypeData = PRODUCT_TYPES.find(p => p.id === product.productType);
                        const matchingItem = stockSnapshot.docs.find(docSnap => {
                            const data = docSnap.data();
                            // El nombre en el stock ahora coincide con el .name de PRODUCT_TYPES (Musculosa, Boxy fit, Manga corta)
                            return data.name === productTypeData?.name && data.category === product.musculosaColor;
                        });

                        if (matchingItem) {
                            const itemData = matchingItem.data();
                            const sizeKey = product.musculosaSize.toLowerCase();
                            const currentStock = itemData.stock?.[sizeKey] || 0;
                            const newStock = currentStock + 1;

                            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'stock', matchingItem.id), {
                                [`stock.${sizeKey}`]: newStock
                            });

                            // Historial
                            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'stockHistory'), {
                                action: 'update',
                                itemName: itemData.name,
                                itemColor: product.musculosaColor,
                                changes: [{ size: product.musculosaSize.toUpperCase(), oldValue: currentStock, newValue: newStock, difference: 1 }],
                                description: `Reversión por edición/eliminación de venta online (${tx.id})`,
                                createdAt: serverTimestamp()
                            });
                        }
                    }
                } catch (err) {
                    console.error('❌ Error al revertir stock:', err);
                }
            };

            const applyStockAndTasks = async (tx) => {
                if (tx.category !== 'online' || !tx.products) return;
                const { db, appId, collection, getDocs, updateDoc, doc, addDoc, serverTimestamp } = window.firebaseData;
                
                console.log('🚀 Aplicando stock y tareas para la transacción:', tx.id);

                // 1. Crear tareas de producción
                try {
                    const tasksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'productionTasks');
                    for (const product of tx.products) {
                        const designName = product.musculosaDesign === 'otro'
                            ? product.musculosaCustomDesign
                            : MUSCULOSA_DESIGNS.find(d => d.id === product.musculosaDesign)?.name;
                        const productTypeData = PRODUCT_TYPES.find(p => p.id === product.productType);
                        const productName = productTypeData?.name || product.productType;
                        const colorName = MUSCULOSA_COLORS.find(c => c.id === product.musculosaColor)?.name || product.musculosaColor;
                        const sizeName = product.musculosaSize.toUpperCase();

                        await addDoc(tasksRef, {
                            status: 'pendiente',
                            productType: product.productType,
                            productName: productName,
                            design: product.musculosaDesign,
                            designName: designName,
                            customDesign: product.musculosaCustomDesign || '',
                            color: product.musculosaColor,
                            colorName: colorName,
                            size: product.musculosaSize,
                            sizeName: sizeName,
                            title: `${productName} ${colorName} - ${designName}`,
                            description: `Talle ${sizeName} - ${tx.title || 'Venta registrada'}`,
                            notes: '',
                            transactionId: tx.id,
                            priority: 'media',
                            createdAt: serverTimestamp()
                        });
                    }
                } catch (err) {
                    console.error('❌ Error al crear tareas de producción:', err);
                }

                // 2. Descontar stock
                try {
                    const stockRef = collection(db, 'artifacts', appId, 'users', user.uid, 'stock');
                    const stockSnapshot = await getDocs(stockRef);
                    
                    for (const product of tx.products) {
                        const productTypeData = PRODUCT_TYPES.find(p => p.id === product.productType);
                        const matchingItem = stockSnapshot.docs.find(docSnap => {
                            const data = docSnap.data();
                            return data.name === productTypeData?.name && data.category === product.musculosaColor;
                        });

                        if (matchingItem) {
                            const itemData = matchingItem.data();
                            const sizeKey = product.musculosaSize.toLowerCase();
                            const currentStock = itemData.stock?.[sizeKey] || 0;
                            const newStock = Math.max(0, currentStock - 1);

                            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'stock', matchingItem.id), {
                                [`stock.${sizeKey}`]: newStock
                            });

                            // Registrar en el historial
                            const designName = product.musculosaDesign === 'otro'
                                ? product.musculosaCustomDesign
                                : MUSCULOSA_DESIGNS.find(d => d.id === product.musculosaDesign)?.name;

                            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'stockHistory'), {
                                action: 'sale',
                                itemName: itemData.name,
                                itemColor: product.musculosaColor,
                                changes: [{
                                    size: product.musculosaSize.toUpperCase(),
                                    oldValue: currentStock,
                                    newValue: newStock,
                                    difference: -1
                                }],
                                description: `Venta online - ${designName}`,
                                createdAt: serverTimestamp()
                            });
                        }
                    }
                } catch (err) {
                    console.error('❌ Error al actualizar stock:', err);
                }
            };

            // --- HANDLERS ---
            const handleSaveTransaction = async (txData) => {
                console.log('💾 handleSaveTransaction llamado con:', txData);
                if (!user) {
                    console.error('❌ No hay usuario autenticado');
                    alert('Error: No hay usuario autenticado. Recarga la página.');
                    return;
                }
                if (!window.firebaseData) {
                    console.error('❌ Firebase no está inicializado');
                    alert('Error: Firebase no está listo. Recarga la página.');
                    return;
                }
                const { db, appId, collection, addDoc, updateDoc, doc, getDoc, serverTimestamp } = window.firebaseData;
                const collectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');

                // Limpiar campos undefined
                const cleanData = { ...txData, amount: parseFloat(txData.amount) };
                Object.keys(cleanData).forEach(key => {
                    if (cleanData[key] === undefined) {
                        delete cleanData[key];
                    }
                });

                try {
                    if (editingTransaction) {
                        console.log('📝 Editando transacción:', txData.id);
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', txData.id);
                        
                        // 1. Revertir estado anterior (si era online)
                        const oldSnap = await getDoc(docRef);
                        if (oldSnap.exists()) {
                            await revertStockAndTasks({ id: oldSnap.id, ...oldSnap.data() });
                        }

                        // 2. Actualizar transacción
                        const { id, createdAt, ...dataToUpdate } = cleanData;
                        await updateDoc(docRef, dataToUpdate);
                        
                        // 3. Aplicar nuevo estado (si es online)
                        await applyStockAndTasks({ id: txData.id, ...dataToUpdate });
                        
                        console.log('✅ Transacción actualizada y sincronizada');
                    } else {
                        console.log('➕ Creando nueva transacción');
                        const { id, ...newTxData } = cleanData;
                        const docRef = await addDoc(collectionRef, { ...newTxData, createdAt: serverTimestamp() });
                        
                        // Aplicar stock y tareas para la nueva transacción
                        await applyStockAndTasks({ id: docRef.id, ...newTxData });
                        
                        console.log('✅ Transacción creada y sincronizada');
                    }
                } catch (e) {
                    console.error('❌ Error al guardar transacción:', e);
                    alert(`Error al guardar: ${e.message}`);
                    return;
                }
                setShowTransactionModal(false); setEditingTransaction(null);
            };

            const handleDeleteTransaction = async (id) => {
                console.log('🗑️ handleDeleteTransaction llamado con id:', id);
                if (!user) {
                    console.error('❌ No hay usuario autenticado');
                    alert('Error: No hay usuario autenticado.');
                    return;
                }
                if (!window.firebaseData) {
                    console.error('❌ Firebase no está inicializado');
                    alert('Error: Firebase no está listo.');
                    return;
                }
                const { db, appId, deleteDoc, doc, getDoc } = window.firebaseData;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id);
                    
                    // 1. Revertir stock y tareas antes de eliminar
                    const oldSnap = await getDoc(docRef);
                    if (oldSnap.exists()) {
                        await revertStockAndTasks({ id: oldSnap.id, ...oldSnap.data() });
                    }

                    // 2. Eliminar transacción
                    await deleteDoc(docRef);
                    console.log('✅ Transacción eliminada y stock revertido');
                } catch (e) {
                    console.error('❌ Error al eliminar:', e);
                    alert(`Error al eliminar: ${e.message}`);
                }
                setShowTransactionModal(false); setEditingTransaction(null);
            };

            const handleSaveStock = async (itemData) => {
                if (!user) return;
                const { db, appId, collection, addDoc, updateDoc, doc, onSnapshot, query, serverTimestamp } = window.firebaseData;
                const collectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'stock');
                const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'stockHistory');
                const cleanData = { ...itemData };
                const historyDescription = itemData.historyDescription || '';

                try {
                    if (editingStock) {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'stock', itemData.id);
                        const { id, createdAt, historyDescription, ...dataToUpdate } = cleanData;

                        // Obtener datos anteriores para el historial
                        const stockQuery = query(collectionRef);
                        const stockSnapshot = await new Promise((resolve, reject) => {
                            const unsubscribe = onSnapshot(stockQuery, (snapshot) => {
                                unsubscribe();
                                resolve(snapshot);
                            }, reject);
                        });

                        const oldDoc = stockSnapshot.docs.find(d => d.id === itemData.id);
                        const oldData = oldDoc?.data();

                        await updateDoc(docRef, dataToUpdate);

                        // Registrar cambios en el historial
                        if (oldData) {
                            const changes = [];
                            ['s', 'm', 'l', 'xl'].forEach(size => {
                                const oldStock = oldData.stock?.[size] || 0;
                                const newStock = itemData.stock?.[size] || 0;
                                if (oldStock !== newStock) {
                                    changes.push({
                                        size: size.toUpperCase(),
                                        oldValue: oldStock,
                                        newValue: newStock,
                                        difference: newStock - oldStock
                                    });
                                }
                            });

                            if (changes.length > 0) {
                                await addDoc(historyRef, {
                                    action: 'update',
                                    itemName: itemData.name,
                                    itemColor: itemData.category,
                                    changes: changes,
                                    description: historyDescription || 'Actualización manual de stock',
                                    createdAt: serverTimestamp()
                                });
                            }
                        }
                    } else {
                        const { id, historyDescription, ...newItemData } = cleanData;
                        await addDoc(collectionRef, { ...newItemData, createdAt: serverTimestamp() });

                        // Registrar creación en el historial
                        await addDoc(historyRef, {
                            action: 'create',
                            itemName: newItemData.name,
                            itemColor: newItemData.category,
                            stock: newItemData.stock,
                            description: historyDescription || 'Producto creado',
                            createdAt: serverTimestamp()
                        });
                    }
                } catch (e) { console.error(e); alert("Error al guardar stock."); }
                setShowStockModal(false); setEditingStock(null);
            };

            const handleDeleteStock = async (id) => {
                if (!user) return;
                const { db, appId, deleteDoc, collection, addDoc, doc, onSnapshot, query, serverTimestamp } = window.firebaseData;

                try {
                    // Obtener datos del item antes de eliminarlo
                    const stockRef = collection(db, 'artifacts', appId, 'users', user.uid, 'stock');
                    const stockQuery = query(stockRef);
                    const stockSnapshot = await new Promise((resolve, reject) => {
                        const unsubscribe = onSnapshot(stockQuery, (snapshot) => {
                            unsubscribe();
                            resolve(snapshot);
                        }, reject);
                    });

                    const itemDoc = stockSnapshot.docs.find(d => d.id === id);
                    const itemData = itemDoc?.data();

                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'stock', id));

                    // Registrar eliminación en el historial
                    if (itemData) {
                        const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'stockHistory');
                        await addDoc(historyRef, {
                            action: 'delete',
                            itemName: itemData.name,
                            itemColor: itemData.category,
                            stock: itemData.stock,
                            description: 'Producto eliminado',
                            createdAt: serverTimestamp()
                        });
                    }
                } catch (e) { console.error(e); }
                setShowStockModal(false); setEditingStock(null);
            };

            // --- FAB Logic ---
            const handleFabClick = () => {
                console.log('🎯 FAB clickeado, tab activo:', activeTab);
                console.log('👤 Usuario actual:', user ? user.uid : 'NO AUTENTICADO');

                if (!user) {
                    alert('Esperando autenticación... Por favor, espera unos segundos y vuelve a intentar.');
                    return;
                }

                if (activeTab === 'stock') {
                    console.log('📦 Abriendo modal de stock');
                    setEditingStock(null);
                    setShowStockModal(true);
                } else {
                    console.log('💰 Abriendo modal de transacción');
                    setEditingTransaction(null);
                    setShowTransactionModal(true);
                }
            };

            const openEditTransaction = (tx) => { setEditingTransaction(tx); setShowTransactionModal(true); };
            const openEditStock = (item) => { setEditingStock(item); setShowStockModal(true); };

            // --- HANDLERS TAREAS DE PRODUCCIÓN ---
            const handleUpdateTaskStatus = async (taskId, newStatus) => {
                if (!user) return;
                const { db, appId, updateDoc, doc } = window.firebaseData;
                try {
                    const taskRef = doc(db, 'artifacts', appId, 'users', user.uid, 'productionTasks', taskId);
                    await updateDoc(taskRef, { status: newStatus });
                    console.log('✅ Estado de tarea actualizado:', taskId, newStatus);
                } catch (e) {
                    console.error('❌ Error al actualizar tarea:', e);
                    alert('Error al actualizar la tarea');
                }
            };

            const handleUpdateTaskNotes = async (taskId, notes) => {
                if (!user) return;
                const { db, appId, updateDoc, doc } = window.firebaseData;
                try {
                    const taskRef = doc(db, 'artifacts', appId, 'users', user.uid, 'productionTasks', taskId);
                    await updateDoc(taskRef, { notes: notes });
                    console.log('✅ Notas de tarea actualizadas:', taskId);
                } catch (e) {
                    console.error('❌ Error al actualizar notas:', e);
                    alert('Error al actualizar las notas');
                }
            };

            const handleDeleteTask = async (taskId) => {
                if (!user) return;
                const { db, appId, deleteDoc, doc } = window.firebaseData;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'productionTasks', taskId));
                    console.log('✅ Tarea eliminada:', taskId);
                } catch (e) {
                    console.error('❌ Error al eliminar tarea:', e);
                    alert('Error al eliminar la tarea');
                }
            };

            if (isLoading) {
                return (
                    <div className="flex h-screen w-full items-center justify-center bg-background-light text-primary">
                        <div className="flex flex-col items-center gap-3"><span className="material-symbols-outlined text-4xl animate-spin">sync</span><span className="text-sm font-medium">Cargando Delfina Concept...</span></div>
                    </div>
                );
            }

            return (
                <div className="relative flex min-h-screen w-full flex-col overflow-hidden pb-24 bg-background-light">
                    <div key={activeTab} className="flex-1 w-full h-full flex flex-col animate-[fade-in-up_0.3s_ease-out_forwards]">
                        {activeTab === 'stock' ? (
                            <StockView items={stockItems} onItemClick={openEditStock} onOpenHistory={() => setShowStockHistoryModal(true)} />
                        ) : activeTab === 'movimientos' ? (
                            <TransactionsView transactions={transactions} totals={financialStats} onTransactionClick={openEditTransaction} initialFilterType={initialTxFilters.type} initialFilterDate={initialTxFilters.date} />
                        ) : (
                            <DashboardView stats={financialStats} transactions={transactions} onTransactionClick={openEditTransaction} onViewAll={() => { setInitialTxFilters({ type: 'all', date: 'all' }); setActiveTab('movimientos'); }} onOpenAnalytics={() => setShowAnalyticsModal(true)} onOpenProductionTasks={() => setShowProductionTasksModal(true)} productionTasks={productionTasks} onNavigateToTransactions={(filters) => { setInitialTxFilters(filters); setActiveTab('movimientos'); }} />
                        )}
                    </div>

                    <button onClick={handleFabClick} className="fixed bottom-24 right-6 h-14 w-14 rounded-full bg-primary text-white shadow-lg shadow-pink-500/40 flex items-center justify-center z-30 hover:bg-primary-dark transition-colors active:scale-95 group">
                        <span className="material-symbols-outlined !text-[32px] group-hover:rotate-90 transition-transform duration-200">add</span>
                    </button>

                    <nav className="fixed bottom-0 w-full bg-white border-t border-gray-100 pb-safe pt-2 px-6 z-40">
                        <div className="flex justify-around items-end h-16 pb-2">
                            <NavButton icon="dashboard" label="Dashboard" isActive={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <NavButton icon="receipt_long" label="Movimientos" isActive={activeTab === 'movimientos'} onClick={() => { setInitialTxFilters({ type: 'all', date: 'all' }); setActiveTab('movimientos'); }} />
                            <NavButton icon="inventory_2" label="Stock" isActive={activeTab === 'stock'} onClick={() => setActiveTab('stock')} />
                        </div>
                    </nav>

                    {showTransactionModal && (
                        <AddTransactionScreen onClose={() => { setShowTransactionModal(false); setEditingTransaction(null); }} onSave={handleSaveTransaction} onDelete={handleDeleteTransaction} initialData={editingTransaction} />
                    )}

                    {showStockModal && (
                        <AddStockScreen onClose={() => { setShowStockModal(false); setEditingStock(null); }} onSave={handleSaveStock} onDelete={handleDeleteStock} initialData={editingStock} />
                    )}

                    {showAnalyticsModal && (
                        <AnalyticsScreen onClose={() => setShowAnalyticsModal(false)} transactions={transactions} stockItems={stockItems} />
                    )}

                    {showStockHistoryModal && (
                        <StockHistoryView onClose={() => setShowStockHistoryModal(false)} history={stockHistory} />
                    )}

                    {showProductionTasksModal && (
                        <ProductionTasksScreen
                            onClose={() => setShowProductionTasksModal(false)}
                            tasks={productionTasks}
                            onUpdateStatus={handleUpdateTaskStatus}
                            onUpdateNotes={handleUpdateTaskNotes}
                            onDeleteTask={handleDeleteTask}
                        />
                    )}
                </div>
            );
        }

        // --- COMPONENTES VISUALES ---
        function FinancialChart({ transactions }) {
            const [hoveredPoint, setHoveredPoint] = useState(null);
            
            // Expandimos a los últimos 30 días para un mejor panorama
            const daysToShow = 30;

            const chartData = useMemo(() => {
                if (!transactions || transactions.length === 0) return null;

                const getLocalMidnight = (dateStr, fallbackTimestamp) => {
                    if (dateStr && typeof dateStr === 'string' && dateStr.includes('-')) {
                        const [y, m, d] = dateStr.split('-');
                        return new Date(y, m - 1, d).getTime();
                    }
                    return fallbackTimestamp || 0;
                };

                const now = new Date();
                const pastDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysToShow);

                const sorted = [...transactions].sort((a, b) => {
                    const dateA = getLocalMidnight(a.fullDate, a.createdAt?.seconds ? a.createdAt.seconds * 1000 : 0);
                    const dateB = getLocalMidnight(b.fullDate, b.createdAt?.seconds ? b.createdAt.seconds * 1000 : 0);
                    return dateA - dateB;
                });

                // Generar puntos diarios (uno por día)
                const dailyData = {};
                for (let i = 0; i <= daysToShow; i++) {
                    const d = new Date(pastDate.getFullYear(), pastDate.getMonth(), pastDate.getDate() + i);
                    dailyData[d.toLocaleDateString('en-US')] = { net: 0, income: 0, expense: 0 };
                }

                sorted.forEach(tx => {
                    const amount = parseFloat(tx.amount);
                    const isIncome = tx.type === 'income';
                    const dateVal = getLocalMidnight(tx.fullDate, tx.createdAt?.seconds ? tx.createdAt.seconds * 1000 : 0);
                    const txDate = new Date(dateVal);
                    
                    if (dateVal >= pastDate.getTime()) {
                         const dateKey = txDate.toLocaleDateString('en-US');
                         if(dailyData[dateKey]) {
                             if(isIncome) dailyData[dateKey].income += amount;
                             else dailyData[dateKey].expense += amount;
                             dailyData[dateKey].net += isIncome ? amount : -amount;
                         }
                    }
                });

                let dataPoints = [];
                for (let i = 0; i <= daysToShow; i++) {
                    const d = new Date(pastDate.getFullYear(), pastDate.getMonth(), pastDate.getDate() + i);
                    const key = d.toLocaleDateString('en-US');
                    dataPoints.push({
                        date: d,
                        timestamp: d.getTime(),
                        net: dailyData[key].net,
                        income: dailyData[key].income,
                        expense: dailyData[key].expense
                    });
                }

                const viewBoxWidth = 800;
                const viewBoxHeight = 350;
                const paddingX = 40;
                const paddingYTop = 30;
                const paddingYBottom = 60;
                
                const usableWidth = viewBoxWidth - (paddingX * 2);
                const usableHeight = viewBoxHeight - paddingYTop - paddingYBottom;

                const minVal = Math.min(...dataPoints.map(d => d.net));
                const maxVal = Math.max(...dataPoints.map(d => d.net));
                
                // Si maxVal y minVal son idénticos o 0, prevenimos divisiones por cero
                const yRange = (maxVal - minVal) === 0 ? 10 : (maxVal - minVal);
                const graphMinY = minVal - (yRange * 0.1);
                const graphMaxY = maxVal + (yRange * 0.1);
                const effectiveYRange = graphMaxY - graphMinY;
                
                const gridLines = [];
                for (let i = 0; i <= 4; i++) {
                    const value = graphMinY + (effectiveYRange * (i / 4));
                    const y = viewBoxHeight - paddingYBottom - (usableHeight * (i / 4));
                    gridLines.push({ value, y });
                }

                const minDate = dataPoints[0].timestamp;
                const maxDate = dataPoints[dataPoints.length - 1].timestamp;
                const rangeX = maxDate - minDate || 1;

                const points = dataPoints.map(d => {
                    const x = paddingX + ((d.timestamp - minDate) / rangeX) * usableWidth;
                    const y = viewBoxHeight - paddingYBottom - (((d.net - graphMinY) / effectiveYRange) * usableHeight);
                    return { ...d, x, y };
                });

                let linePath = `M ${points[0].x},${points[0].y}`;
                // Curvas más orgánicas
                for (let i = 0; i < points.length - 1; i++) {
                    const p0 = points[i === 0 ? 0 : i - 1];
                    const p1 = points[i];
                    const p2 = points[i + 1];
                    const p3 = points[i + 2 === points.length ? i + 1 : i + 2];

                    const tension = 0.2;
                    const cp1x = p1.x + (p2.x - p0.x) * tension;
                    const cp1y = p1.y + (p2.y - p0.y) * tension;
                    const cp2x = p2.x - (p3.x - p1.x) * tension;
                    const cp2y = p2.y - (p3.y - p1.y) * tension;
                    
                    linePath += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
                }

                // Generar path de area desde el zeroY real para que no baje todo si hay negativos
                const zeroY = viewBoxHeight - paddingYBottom - (((0 - graphMinY) / effectiveYRange) * usableHeight);
                const safeZeroY = (isNaN(zeroY) || zeroY < 0 || zeroY > viewBoxHeight) ? viewBoxHeight - paddingYBottom : zeroY;
                
                const areaPath = `M ${points[0].x},${safeZeroY} L ${points[0].x},${points[0].y} ${linePath.substring(2)} L ${points[points.length - 1].x},${safeZeroY} Z`;

                const startDateStr = new Date(pastDate).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
                const endDateStr = new Date(now).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });

                return { 
                    linePath, areaPath, points, gridLines, 
                    viewBoxWidth, viewBoxHeight, paddingX, paddingYBottom, safeZeroY,
                    startDateStr, endDateStr
                };
            }, [transactions, daysToShow]);

            const svgRef = useRef(null);
            const handleMouseMove = (e) => {
                if (!chartData || !svgRef.current) return;
                const rect = svgRef.current.getBoundingClientRect();
                const xRate = (e.clientX - rect.left) / rect.width;
                const localX = xRate * chartData.viewBoxWidth;
                
                let closestPoint = chartData.points[0];
                let minDiff = Math.abs(chartData.points[0].x - localX);
                for (let i = 1; i < chartData.points.length; i++) {
                    const diff = Math.abs(chartData.points[i].x - localX);
                    if (diff < minDiff) {
                        minDiff = diff;
                        closestPoint = chartData.points[i];
                    }
                }
                setHoveredPoint(closestPoint);
            };

            const handleMouseLeave = () => {
                setHoveredPoint(null);
            };

            if (!transactions || transactions.length === 0) {
                return (
                    <div className="h-64 w-full flex flex-col items-center justify-center text-text-muted bg-gray-50 rounded-xl border border-dashed border-gray-200">
                        <span className="material-symbols-outlined text-4xl mb-2 opacity-50">bar_chart</span>
                        <p className="text-sm font-medium">Sin datos suficientes</p>
                    </div>
                );
            }
            if (!chartData) return null;

            return (
                <div className="relative w-full overflow-visible bg-white rounded-2xl shadow-soft border border-pink-50/50 p-4 mb-2">
                    <div className="flex justify-between items-end mb-4 px-2">
                        <div>
                            <h3 className="text-sm font-bold text-text-main flex items-center gap-1.5">
                                <span className="material-symbols-outlined !text-[18px] text-primary">insights</span>
                                Movimientos Diarios
                            </h3>
                            <p className="text-xs text-text-muted mt-0.5 ml-6">Ingresos y Egresos (30 días)</p>
                        </div>
                    </div>

                    <div className="relative w-full" style={{ paddingBottom: '45%' }}>
                        <svg 
                            ref={svgRef}
                            className="absolute top-0 left-0 w-full h-full cursor-crosshair overflow-visible touch-none" 
                            viewBox={`0 0 ${chartData.viewBoxWidth} ${chartData.viewBoxHeight}`}
                            preserveAspectRatio="none"
                            onMouseMove={handleMouseMove}
                            onTouchMove={(e) => handleMouseMove(e.touches[0])}
                            onMouseLeave={handleMouseLeave}
                            onTouchEnd={handleMouseLeave}
                        >
                            <defs>
                                <linearGradient id="premiumGradient" x1="0" x2="0" y1="0" y2="1">
                                    <stop offset="0%" stopColor="#f4258c" stopOpacity="0.4"></stop>
                                    <stop offset="50%" stopColor="#f4258c" stopOpacity="0.1"></stop>
                                    <stop offset="100%" stopColor="#f4258c" stopOpacity="0.0"></stop>
                                </linearGradient>
                                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                    <feGaussianBlur stdDeviation="3" result="blur" />
                                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                </filter>
                            </defs>

                            {chartData.gridLines.map((gl, idx) => (
                                <g key={`gridY-${idx}`}>
                                    <line 
                                        x1={chartData.paddingX} 
                                        x2={chartData.viewBoxWidth - chartData.paddingX} 
                                        y1={gl.y} 
                                        y2={gl.y} 
                                        stroke="#f4f4f5" 
                                        strokeWidth="1.5" 
                                        strokeDasharray="6 6"
                                    />
                                    <text 
                                        x={chartData.paddingX - 10} 
                                        y={gl.y + 4} 
                                        fill="#a1a1aa" 
                                        fontSize="11" 
                                        textAnchor="end"
                                        fontFamily="Inter, sans-serif"
                                        fontWeight="600"
                                    >
                                        ${Math.round(gl.value).toLocaleString('es-ES')}
                                    </text>
                                </g>
                            ))}
                            
                            {/* Línea Base Zero */}
                            {chartData.safeZeroY > 0 && chartData.safeZeroY < chartData.viewBoxHeight && (
                                <line 
                                    x1={chartData.paddingX} 
                                    x2={chartData.viewBoxWidth - chartData.paddingX} 
                                    y1={chartData.safeZeroY} 
                                    y2={chartData.safeZeroY} 
                                    stroke="#ec4899" 
                                    strokeWidth="1" 
                                    opacity="0.3"
                                />
                            )}

                            <text x={chartData.points[0].x} y={chartData.viewBoxHeight - 30} fill="#a1a1aa" fontSize="12" textAnchor="start" fontFamily="Inter, sans-serif" fontWeight="600">{chartData.startDateStr}</text>
                            <text x={chartData.points[Math.floor(chartData.points.length / 2)].x} y={chartData.viewBoxHeight - 30} fill="#a1a1aa" fontSize="12" textAnchor="middle" fontFamily="Inter, sans-serif" fontWeight="600">hace 15 días</text>
                            <text x={chartData.points[chartData.points.length - 1].x} y={chartData.viewBoxHeight - 30} fill="#a1a1aa" fontSize="12" textAnchor="end" fontFamily="Inter, sans-serif" fontWeight="600">{chartData.endDateStr}</text>

                            <g className="animate-fade-in-up" strokeLinecap="round" strokeLinejoin="round">
                                <path d={chartData.areaPath} fill="url(#premiumGradient)" stroke="none" />
                                <path d={chartData.linePath} fill="none" stroke="#f4258c" strokeWidth="4" filter="url(#glow)"/>
                                <path d={chartData.linePath} fill="none" stroke="#f4258c" strokeWidth="3" />
                            </g>

                            <circle 
                                cx={chartData.points[chartData.points.length - 1].x} 
                                cy={chartData.points[chartData.points.length - 1].y} 
                                fill="white" 
                                r="5" 
                                stroke="#f4258c" 
                                strokeWidth="3"
                            />

                            {hoveredPoint && (
                                <g>
                                    <line 
                                        x1={hoveredPoint.x} 
                                        x2={hoveredPoint.x} 
                                        y1={hoveredPoint.y} 
                                        y2={chartData.viewBoxHeight - chartData.paddingYBottom} 
                                        stroke="#f4258c"

        // --- VISTAS ---
        function DashboardView({ stats, transactions, onTransactionClick, onViewAll, onOpenAnalytics, onOpenProductionTasks, productionTasks, onNavigateToTransactions }) {

            const tasksInProgress = productionTasks.filter(task => task.status === 'produccion').length;
            const tasksPending = productionTasks.filter(task => task.status === 'pendiente').length;

            const toggleBalanceVisibility = (e) => {

                setIsBalanceHidden(newVal);
                localStorage.setItem('delfinaHideBalance', String(newVal));

            return (

                                <div className="relative z-10">
                                    <div className="flex justify-between items-start">
                                        <span className="text-pink-100 text-sm font-medium uppercase tracking-wider">Balance Total</span>
                                        <span onClick={toggleBalanceVisibility} className="material-symbols-outlined text-pink-100 !text-[24px] cursor-pointer hover:text-white transition-colors">
                                            {isBalanceHidden ? 'visibility_off' : 'visibility'}
                                        </span>
                                    </div>
                                    <p className="text-[42px] font-bold tracking-tight leading-none mt-2">
                                        {isBalanceHidden ? '***' : `$${stats.totalBalance.toLocaleString()}`}
                                    </p>
                                    <div className={`flex items-center gap-1.5 mt-4 text-xs w-fit px-3 py-1.5 rounded-lg backdrop-blur-sm ${stats.isBalanceUp ? 'bg-white/20' : 'bg-red-900/30'}`}>
                                        <span className="material-symbols-outlined !text-[16px]">{stats.isBalanceUp ? 'trending_up' : 'trending_down'}</span>
                                        <span className="font-medium">{stats.balanceGrowth > 0 ? '+' : ''}{stats.balanceGrowth}% vs mes anterior</span>
                                    </div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">

                                    <div className="flex justify-between items-start">
                                        <div className="bg-green-100 text-green-600 w-10 h-10 flex items-center justify-center rounded-full">
                                            <span className="material-symbols-outlined !text-[24px]">arrow_downward</span>
                                        </div>
                                        <span className={`text-xs font-bold px-2 py-1 rounded-full ${stats.isIncomeUp ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50'}`}>{stats.isIncomeUp ? '+' : ''}{stats.incomeGrowth}%</span>
                                    </div>
                                    <div><span className="text-text-muted text-sm font-medium block mb-1">Ingresos (Mes)</span><p className="text-text-main text-2xl font-bold leading-tight">${stats.currentIncome.toLocaleString()}</p></div>
                                </div>
                                <div onClick={() => onNavigateToTransactions && onNavigateToTransactions({ type: 'expense', date: 'month' })} className="bg-white border border-pink-100 rounded-2xl p-5 shadow-soft flex flex-col justify-between h-[165px] cursor-pointer hover:shadow-md transition-shadow active:scale-[0.98]">
                                    <div className="flex justify-between items-start">

                                            <span className="material-symbols-outlined !text-[24px]">arrow_upward</span>

                                    </div>
                                    <div><span className="text-text-muted text-sm font-medium block mb-1">Gastos (Mes)</span><p className="text-text-main text-2xl font-bold leading-tight">${stats.currentExpense.toLocaleString()}</p></div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div onClick={onOpenAnalytics} className="relative bg-gradient-to-br from-purple-500 to-purple-700 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all cursor-pointer active:scale-[0.98] flex flex-col justify-between h-[120px] group overflow-hidden">
                                    <div className="absolute right-0 top-0 w-32 h-32 bg-white/10 rounded-full -mr-12 -mt-12 pointer-events-none"></div>
                                    <div className="relative z-10 flex items-center justify-between">
                                        <span className="text-white text-sm font-bold">Analytics</span>
                                        <span className="material-symbols-outlined text-white !text-[28px]">analytics</span>
                                    </div>
                                    <div className="relative z-10 flex items-center gap-1 text-white/80 text-xs">
                                        <span>Ver estadísticas</span>

                                    </div>
                                </div>
                                <div onClick={onOpenProductionTasks} className="relative bg-gradient-to-br from-primary to-pink-600 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all cursor-pointer active:scale-[0.98] flex flex-col justify-between h-[120px] group overflow-hidden">
                                    {(tasksInProgress > 0 || tasksPending > 0) && (
                                        <div className="absolute top-3 right-3 bg-white text-primary w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shadow-md z-20">
                                            {tasksInProgress + tasksPending}
                                        </div>

                                    <div className="absolute right-0 top-0 w-32 h-32 bg-white/10 rounded-full -mr-12 -mt-12 pointer-events-none"></div>
                                    <div className="relative z-10 flex items-center justify-between">
