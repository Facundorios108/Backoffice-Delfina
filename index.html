                            </div>
                        </section>
                    </main>
                </>
            );
        }

        function TransactionsView({ transactions, totals, onTransactionClick, initialFilterType = 'all', initialFilterDate = 'all' }) {
            const scrollRef = useRef(null);

            // --- State para Filtros ---
            const [filterDate, setFilterDate] = useState(initialFilterDate);
            const [filterCategory, setFilterCategory] = useState('all');
            const [filterType, setFilterType] = useState(initialFilterType);
            const [filterPaymentMethod, setFilterPaymentMethod] = useState('all');
            const [customRange, setCustomRange] = useState({ start: '', end: '' });

            const [activeDropdown, setActiveDropdown] = useState(null);
            const [showCustomDateModal, setShowCustomDateModal] = useState(false);

            useEffect(() => {
                const handleClick = () => setActiveDropdown(null);
                if (activeDropdown) window.addEventListener('click', handleClick);
                return () => window.removeEventListener('click', handleClick);
            }, [activeDropdown]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = 0;
            }, []);

            // --- Lógica de Filtrado ---
            const filteredTransactions = useMemo(() => {
                return transactions.filter(tx => {
                    const dateStr = tx.fullDate || "2023-01-01";
                    const [y, m, d] = dateStr.split('-').map(Number);
                    const txDate = new Date(y, m - 1, d);
                    const now = new Date();
                    now.setHours(0, 0, 0, 0);

                    let dateMatch = true;
                    if (filterDate === 'year') dateMatch = txDate.getFullYear() === now.getFullYear();
                    else if (filterDate === 'month') dateMatch = txDate.getMonth() === now.getMonth() && txDate.getFullYear() === now.getFullYear();
                    else if (filterDate === 'week') {
                        const day = now.getDay() || 7; if (day !== 1) now.setHours(-24 * (day - 1));
                        const weekStart = now.getTime(); const weekEnd = weekStart + (7 * 24 * 60 * 60 * 1000);
                        const txTime = txDate.getTime(); dateMatch = txTime >= weekStart && txTime < weekEnd;
                    } else if (filterDate === 'custom') {
                        if (customRange.start && customRange.end) {
                            const start = new Date(customRange.start + 'T00:00:00').getTime();
                            const end = new Date(customRange.end + 'T23:59:59').getTime();
                            const txTime = txDate.getTime(); dateMatch = txTime >= start && txTime <= end;
                        }
                    }

                    let catMatch = filterCategory === 'all' || tx.category === filterCategory;
                    let typeMatch = filterType === 'all' || tx.type === filterType;

                    // Filtro de método de pago: si está activo, solo mostrar las que coincidan
                    let paymentMatch = true;
                    if (filterPaymentMethod !== 'all') {
                        // Si hay filtro activo, solo mostrar transacciones con ese método específico
                        paymentMatch = tx.paymentMethod === filterPaymentMethod;
                    }

                    return dateMatch && catMatch && typeMatch && paymentMatch;
                }).sort((a, b) => {
                    // Ordenar por fecha: más reciente primero
                    const dateA = a.fullDate || "2023-01-01";
                    const dateB = b.fullDate || "2023-01-01";
                    return dateB.localeCompare(dateA);
                });
            }, [transactions, filterDate, filterCategory, filterType, customRange, filterPaymentMethod]);

            const grouped = filteredTransactions.reduce((acc, tx) => {
                const [y, m, d] = (tx.fullDate || "").split('-');
                const dateObj = new Date(y, m - 1, d);
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                let label = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
                if (dateObj.toDateString() === today.toDateString()) label = "Hoy";
                else if (dateObj.toDateString() === yesterday.toDateString()) label = "Ayer";

                if (!acc[label]) acc[label] = []; acc[label].push(tx); return acc;
            }, {});
            const sections = Object.keys(grouped);

            const getFilterLabel = () => {
                if (filterDate === 'all') return 'Todo';
                if (filterDate === 'year') return 'Este Año';
                if (filterDate === 'month') return 'Este Mes';
                if (filterDate === 'week') return 'Esta Semana';
                if (filterDate === 'custom') return 'Personalizado';
            };

            const exportToCSV = () => {
                if (filteredTransactions.length === 0) {
                    alert('No hay movimientos para exportar con estos filtros.');
                    return;
                }
                // BOM para que Excel lea correctamente los tiles en UTF-8
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
                csvContent += "Fecha,Tipo,Categoría,Metodo de Pago,Descripcion,Monto\r\n";
                
                filteredTransactions.forEach(tx => {
                    const fecha = tx.fullDate || "";
                    const tipo = tx.type === 'income' ? 'Ingreso' : 'Egreso';
                    const categoria = (TRANSACTION_CATEGORIES.find(c => c.id === tx.category)?.name || tx.category || "");
                    const pago = (PAYMENT_METHODS.find(m => m.id === tx.paymentMethod)?.name || tx.paymentMethod || "Efectivo");
                    const desc = (tx.description || "").replace(/,/g, "-").replace(/\n/g, " "); 
                    const monto = tx.amount || 0;
                    
                    csvContent += `${fecha},${tipo},${categoria},${pago},${desc},${monto}\r\n`;
                });
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Movimientos_Delfina_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const getCategoryLabel = () => {
                if (filterCategory === 'all') return 'Categoría';
                const cat = TRANSACTION_CATEGORIES.find(c => c.id === filterCategory);
                return cat ? cat.name : 'Categoría';
            };

            const getTypeLabel = () => {
                if (filterType === 'all') return 'Tipo';
                if (filterType === 'income') return 'Ingresos';
                if (filterType === 'expense') return 'Egresos';
            }

            const getPaymentMethodLabel = () => {
                if (filterPaymentMethod === 'all') return 'Pago';
                const method = PAYMENT_METHODS.find(m => m.id === filterPaymentMethod);
                return method ? method.name : 'Pago';
            }

            return (
                <div className="flex flex-col h-full bg-background-light">
                    <div className="z-20 flex flex-col bg-background-light/95 backdrop-blur-md pt-4 sticky top-0">
                        <div className="flex items-center justify-between px-6 pt-4 pb-2">
                            <div className="flex flex-col"><h1 className="text-3xl font-bold tracking-tight text-text-main">Mis Movimientos</h1><p className="text-sm text-text-sub font-medium mt-1">Control de caja</p></div>
                            <button onClick={exportToCSV} className="flex items-center justify-center h-10 w-10 shrink-0 rounded-full bg-white border border-gray-200 text-text-muted hover:text-primary hover:border-primary/30 hover:bg-primary/5 transition-all active:scale-95 shadow-sm" title="Exportar Movimientos a CSV">
                                <span className="material-symbols-outlined text-[20px]">download</span>
                            </button>
                        </div>
                        <div className="flex w-full gap-3 flex-wrap px-6 py-4 relative">
                            {/* Fecha */}
                            <div className="relative shrink-0">
                                <button onClick={(e) => { e.stopPropagation(); setActiveDropdown(activeDropdown === 'date' ? null : 'date'); }} className={`group flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full pl-4 pr-3 shadow-sm transition-all active:scale-95 ${filterDate !== 'all' ? 'bg-primary text-white shadow-primary/20' : 'bg-white border border-gray-200 text-text-muted'}`}><span className="text-sm font-semibold leading-normal capitalize">📅 {getFilterLabel()}</span><span className="material-symbols-outlined text-[18px]">expand_more</span></button>
                                {activeDropdown === 'date' && (
                                    <div className="absolute top-full mt-2 left-0 z-50 bg-white rounded-xl shadow-xl border border-gray-100 p-2 w-48 animate-fade-in">
                                        <button onClick={() => setFilterDate('all')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Todo</button>
                                        <button onClick={() => setFilterDate('year')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Este Año</button>
                                        <button onClick={() => setFilterDate('month')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Este Mes</button>
                                        <button onClick={() => setFilterDate('week')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Esta Semana</button>
                                        <div className="h-px bg-gray-100 my-1"></div>
                                        <button onClick={() => { setShowCustomDateModal(true); setFilterDate('custom'); setActiveDropdown(null); }} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Personalizado...</button>
                                    </div>
                                )}
                            </div>

                            {/* Categoría */}
                            <div className="relative shrink-0">
                                <button onClick={(e) => { e.stopPropagation(); setActiveDropdown(activeDropdown === 'category' ? null : 'category'); }} className={`group flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full pl-4 pr-3 border transition-all active:scale-95 ${filterCategory !== 'all' ? 'bg-primary text-white border-transparent' : 'bg-white border-gray-200 text-text-muted'}`}><span className="text-sm font-medium leading-normal">🏷️ {getCategoryLabel()}</span><span className="material-symbols-outlined text-[18px]">expand_more</span></button>
                                {activeDropdown === 'category' && (
                                    <div className="absolute top-full mt-2 left-0 z-50 bg-white rounded-xl shadow-xl border border-gray-100 p-2 w-48 animate-fade-in max-h-60 overflow-y-auto">
                                        <button onClick={() => setFilterCategory('all')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Todas</button>
                                        {TRANSACTION_CATEGORIES.map(cat => (
                                            <button key={cat.id} onClick={() => setFilterCategory(cat.id)} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">{cat.name}</button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Tipo */}
                            <div className="relative shrink-0">
                                <button onClick={(e) => { e.stopPropagation(); setActiveDropdown(activeDropdown === 'type' ? null : 'type'); }} className={`group flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full pl-4 pr-3 border transition-all active:scale-95 ${filterType !== 'all' ? 'bg-primary text-white border-transparent' : 'bg-white border-gray-200 text-text-muted'}`}><span className="text-sm font-medium leading-normal">💰 {getTypeLabel()}</span><span className="material-symbols-outlined text-[18px]">expand_more</span></button>
                                {activeDropdown === 'type' && (
                                    <div className="absolute top-full mt-2 left-0 z-50 bg-white rounded-xl shadow-xl border border-gray-100 p-2 w-40 animate-fade-in">
                                        <button onClick={() => setFilterType('all')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Todos</button>
                                        <button onClick={() => setFilterType('income')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Ingresos</button>
                                        <button onClick={() => setFilterType('expense')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Egresos</button>
                                    </div>
                                )}
                            </div>

                            {/* Pago */}
                            <div className="relative shrink-0">
                                <button onClick={(e) => { e.stopPropagation(); setActiveDropdown(activeDropdown === 'payment' ? null : 'payment'); }} className={`group flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full pl-4 pr-3 border transition-all active:scale-95 ${filterPaymentMethod !== 'all' ? 'bg-primary text-white border-transparent' : 'bg-white border-gray-200 text-text-muted'}`}><span className="text-sm font-medium leading-normal">💳 {getPaymentMethodLabel()}</span><span className="material-symbols-outlined text-[18px]">expand_more</span></button>
                                {activeDropdown === 'payment' && (
                                    <div className="absolute top-full mt-2 left-0 z-50 bg-white rounded-xl shadow-xl border border-gray-100 p-2 w-48 animate-fade-in">
                                        <button onClick={() => setFilterPaymentMethod('all')} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">Todos</button>
                                        {PAYMENT_METHODS.map(method => (
                                            <button key={method.id} onClick={() => setFilterPaymentMethod(method.id)} className="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-gray-50">{method.name}</button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="h-px w-full bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
                    </div>

                    <div ref={scrollRef} className="flex-1 overflow-y-auto pb-24 scroll-smooth">
                        <div className="px-6 pt-6 pb-2">
                            <div className="flex w-full items-center justify-between rounded-2xl bg-gradient-to-br from-primary-soft to-white border border-primary/10 p-4 shadow-sm">
                                <div className="flex flex-col gap-1"><span className="text-xs font-semibold uppercase tracking-wider text-text-sub">Balance Total</span><span className="text-2xl font-bold text-text-main">${totals.totalBalance.toLocaleString()}</span></div>
                                <div className="flex h-10 w-10 items-center justify-center rounded-full bg-white text-primary shadow-sm"><span className="material-symbols-outlined">account_balance_wallet</span></div>
                            </div>
                        </div>
                        {sections.length === 0 ? <div className="flex flex-col items-center justify-center py-20 opacity-50"><span className="material-symbols-outlined text-5xl mb-3 text-gray-300">filter_list_off</span><p className="font-medium text-gray-400">No se encontraron movimientos</p></div> : sections.map(sectionDate => (
                            <div key={sectionDate} className="flex flex-col mt-4 first:mt-2">
                                <div className="sticky top-0 z-10 bg-background-light/95 backdrop-blur-sm px-6 py-3"><h3 className="text-sm font-bold uppercase tracking-wider text-text-sub capitalize">{sectionDate}</h3></div>
                                <div className="flex flex-col px-4 gap-2">{grouped[sectionDate].map(tx => <DetailedTransactionItem key={tx.id} data={tx} onClick={() => onTransactionClick(tx)} />)}</div>
                            </div>
                        ))}
                        <div className="h-24"></div>
                    </div>

                    {showCustomDateModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl animate-slide-up">
                                <h3 className="text-lg font-bold text-text-main mb-4">Filtrar por Fecha</h3>
                                <div className="space-y-4">
                                    <div><label className="text-xs font-semibold text-text-muted uppercase mb-1 block">Desde</label><input type="date" value={customRange.start} onChange={(e) => setCustomRange({ ...customRange, start: e.target.value })} className="w-full rounded-xl border-gray-200 bg-gray-50 text-sm focus:ring-primary focus:border-primary" /></div>
                                    <div><label className="text-xs font-semibold text-text-muted uppercase mb-1 block">Hasta</label><input type="date" value={customRange.end} onChange={(e) => setCustomRange({ ...customRange, end: e.target.value })} className="w-full rounded-xl border-gray-200 bg-gray-50 text-sm focus:ring-primary focus:border-primary" /></div>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => { setShowCustomDateModal(false); setFilterDate('all') }} className="flex-1 py-2.5 rounded-xl border border-gray-200 text-text-muted font-medium text-sm">Cancelar</button>
                                        <button onClick={() => setShowCustomDateModal(false)} className="flex-1 py-2.5 rounded-xl bg-primary text-white font-bold text-sm shadow-lg shadow-primary/30">Aplicar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function StockView({ items, onItemClick, onOpenHistory }) {
            const scrollRef = useRef(null);
            const [search, setSearch] = useState('');
            const [activeCategory, setActiveCategory] = useState('all');
            const [showNotifications, setShowNotifications] = useState(false);
            const [readNotifications, setReadNotifications] = useState(() => {
                try {
                    const saved = localStorage.getItem('delfinaReadNotifications');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, []);

            useEffect(() => {
                // Remover notificaciones leídas si el producto ya no tiene bajo stock
                const currentLowStockIds = items.filter(item => {
                    const total = (item.stock?.s || 0) + (item.stock?.m || 0) + (item.stock?.l || 0) + (item.stock?.xl || 0);
                    return total <= 3;
                }).map(i => i.id);

                setReadNotifications(prev => {
                    const valid = prev.filter(id => currentLowStockIds.includes(id));
                    if (valid.length !== prev.length) {
                        try { localStorage.setItem('delfinaReadNotifications', JSON.stringify(valid)); } catch(e){}
                        return valid;
                    }
                    return prev;
                });
            }, [items]);

            const unreadNotifications = useMemo(() => {
                const lowStockList = [];
                items.forEach(item => {
                    const itemTotal = (item.stock?.s || 0) + (item.stock?.m || 0) + (item.stock?.l || 0) + (item.stock?.xl || 0);
                    if (itemTotal <= 3) {
                        lowStockList.push({ ...item, totalStock: itemTotal });
                    }
                });
                return lowStockList.filter(item => !readNotifications.includes(item.id));
            }, [items, readNotifications]);

            const handleNotificationClick = (item) => {
                const newRead = [...readNotifications, item.id];
                setReadNotifications(newRead);
                try { localStorage.setItem('delfinaReadNotifications', JSON.stringify(newRead)); } catch(e){}
                
                setShowNotifications(false);
                setActiveCategory(item.category || 'all');
                setSearch(item.name);
            };

            // Filtros de Stock por Color
            const filteredItems = useMemo(() => {
                return items.filter(item => {
                    const itemTotal = (item.stock?.s || 0) + (item.stock?.m || 0) + (item.stock?.l || 0) + (item.stock?.xl || 0);
                    const matchesSearch = item.name.toLowerCase().includes(search.toLowerCase());
                    
                    if (activeCategory === 'low_stock') {
                        return matchesSearch && itemTotal <= 3;
                    }

                    const matchesCategory = activeCategory === 'all' || item.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [items, search, activeCategory]);

            // Estadísticas Stock (Suma de talles)
            const stats = useMemo(() => {
                let totalItems = 0;
                let lowStockCount = 0;

                items.forEach(item => {
                    const itemTotal = (item.stock?.s || 0) + (item.stock?.m || 0) + (item.stock?.l || 0) + (item.stock?.xl || 0);
                    totalItems += itemTotal;
                    if (itemTotal <= 3) lowStockCount++;
                });

                return { totalItems, lowStockCount };
            }, [items]);

            const exportToCSV = () => {
                if (filteredItems.length === 0) {
                    alert('No hay items de stock para exportar.');
                    return;
                }
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
                csvContent += "Articulo,Categoría,Precio,Talle S,Talle M,Talle L,Talle XL,Total Unidades\r\n";
                
                filteredItems.forEach(item => {
                    const nombre = (item.name || "").replace(/,/g, "-").replace(/\n/g, " ");
                    const cat = STOCK_CATEGORIES.find(c => c.id === item.category)?.name || item.category || "";
                    const precio = item.price || 0;
                    const s = item.stock?.s || 0;
                    const m = item.stock?.m || 0;
                    const l = item.stock?.l || 0;
                    const xl = item.stock?.xl || 0;
                    const total = s + m + l + xl;
                    
                    csvContent += `${nombre},${cat},${precio},${s},${m},${l},${xl},${total}\r\n`;
                });
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Stock_Delfina_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <>
                    <header className="flex items-center justify-between px-8 pt-8 pb-4 bg-background-light/90 backdrop-blur-md sticky top-0 z-20">
                        <div className="flex flex-col">
                            <span className="text-text-muted text-sm font-medium">Gestión de Inventario</span>
                            <h2 className="text-text-main text-2xl font-bold tracking-tight">Delfina Concept</h2>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={exportToCSV} className="relative flex h-11 w-11 items-center justify-center rounded-full bg-white shadow-sm border border-pink-100 text-text-main hover:text-primary hover:bg-pink-50 transition-all active:scale-95" title="Exportar Stock a CSV">
                                <span className="material-symbols-outlined !text-[24px]">download</span>
                            </button>
                            <button onClick={onOpenHistory} className="relative flex h-11 w-11 items-center justify-center rounded-full bg-white shadow-sm border border-pink-100 text-primary hover:bg-pink-50 transition-all active:scale-95">
                                <span className="material-symbols-outlined !text-[24px]">history</span>
                            </button>
                            <div className="relative">
                                <button onClick={() => setShowNotifications(!showNotifications)} className="relative flex h-11 w-11 items-center justify-center rounded-full bg-white shadow-sm border border-pink-100 text-text-main transition-transform active:scale-95 hover:text-primary hover:bg-pink-50">
                                    <span className="material-symbols-outlined !text-[24px]">notifications</span>
                                    {unreadNotifications.length > 0 && (
                                        <span className="absolute top-2.5 right-3 h-2 w-2 rounded-full bg-primary ring-2 ring-white animate-pulse"></span>
                                    )}
                                </button>
                                {showNotifications && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setShowNotifications(false)}></div>
                                        <div className="absolute right-0 top-14 w-80 bg-white rounded-2xl shadow-xl shadow-pink-500/10 border border-pink-100 p-0 overflow-hidden z-50 animate-slide-up origin-top-right">
                                            <div className="flex justify-between items-center p-4 border-b border-pink-50 bg-pink-50/30">
                                                <h4 className="font-bold text-text-main text-sm uppercase tracking-wider">Notificaciones</h4>
                                                <span className={`${unreadNotifications.length > 0 ? 'bg-primary text-white' : 'bg-pink-100 text-primary'} text-[10px] font-bold px-2 py-0.5 rounded-full`}>{unreadNotifications.length}</span>
                                            </div>
                                            
                                            {unreadNotifications.length === 0 ? (
                                                <div className="flex flex-col items-center justify-center py-8 text-center px-4">
                                                    <div className="h-12 w-12 rounded-full bg-pink-50 flex items-center justify-center mb-3">
                                                        <span className="material-symbols-outlined text-primary !text-[24px]">notifications_paused</span>
                                                    </div>
                                                    <p className="text-text-main font-semibold text-sm">¡Todo al día!</p>
                                                    <p className="text-text-muted text-xs mt-1 leading-relaxed">No tienes notificaciones<br/>nuevas en este momento.</p>
                                                </div>
                                            ) : (
                                                <div className="max-h-[60vh] overflow-y-auto">
                                                    {unreadNotifications.map(item => {
                                                        const catName = STOCK_CATEGORIES.find(c => c.id === item.category)?.name || item.category;
                                                        return (
                                                            <div key={item.id} onClick={() => handleNotificationClick(item)} className="p-3 border-b border-pink-50 hover:bg-pink-50/50 cursor-pointer flex gap-3 transition-colors last:border-b-0 active:bg-pink-100">
                                                                <div className="h-10 w-10 shrink-0 rounded-full bg-red-50 text-red-500 flex items-center justify-center shadow-sm">
                                                                    <span className="material-symbols-outlined !text-[20px]">warning</span>
                                                                </div>
                                                                <div className="flex-1 flex flex-col justify-center">
                                                                    <p className="text-sm font-bold text-text-main line-clamp-1">{item.name} <span className="text-text-muted text-xs font-normal">({catName})</span></p>
                                                                    <p className="text-xs text-text-muted font-medium mt-0.5">Stock crítico: <span className="text-red-500 font-bold">{item.totalStock}</span> unidades</p>
                                                                </div>
                                                                <div className="flex items-center">
                                                                    <span className="material-symbols-outlined text-pink-300 !text-[16px]">chevron_right</span>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </header>

                    <main ref={scrollRef} className="flex-1 overflow-y-auto px-6 py-2 space-y-6 hide-scrollbar">
                        <section className="flex gap-3">
                            <div className="relative flex-1">
                                <span className="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-pink-300">search</span>
                                <input
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="w-full pl-11 pr-4 py-3.5 rounded-2xl border-none bg-white shadow-soft text-sm text-text-main focus:ring-2 focus:ring-primary/50 placeholder-pink-300/70"
                                    placeholder="Buscar prendas..."
                                    type="text"
                                />
                            </div>
                            <button onClick={() => setSearch('')} className="bg-white h-[52px] w-[52px] flex items-center justify-center rounded-2xl shadow-soft text-primary hover:bg-pink-50 transition-colors">
                                <span className="material-symbols-outlined">restart_alt</span>
                            </button>
                        </section>

                        <section className="grid grid-cols-2 gap-4">
                            <div className="bg-primary rounded-2xl p-5 shadow-glow text-white relative overflow-hidden group">
                                <div className="absolute right-0 top-0 w-24 h-24 bg-white/10 rounded-full -mr-8 -mt-8 pointer-events-none group-hover:scale-110 transition-transform"></div>
                                <span className="text-pink-100 text-xs font-medium uppercase tracking-wider">Total Unidades</span>
                                <p className="text-3xl font-bold mt-1">{stats.totalItems}</p>
                                <div className="flex items-center gap-1 mt-3 text-xs bg-white/20 w-fit px-2 py-1 rounded-lg backdrop-blur-sm">
                                    <span className="material-symbols-outlined !text-[14px]">check_circle</span>
                                    <span>Inventario OK</span>
                                </div>
                            </div>
                            <div onClick={() => setActiveCategory(activeCategory === 'low_stock' ? 'all' : 'low_stock')} className={`rounded-2xl p-5 shadow-soft flex flex-col justify-center cursor-pointer transition-all ${activeCategory === 'low_stock' ? 'bg-pink-50 border border-primary text-primary scale-[1.02]' : 'bg-white border border-pink-100 hover:bg-pink-50'}`}>
                                <span className="text-text-muted text-xs font-medium uppercase tracking-wider">Stock Bajo</span>
                                <div className="flex items-baseline gap-1 mt-1">
                                    <p className="text-3xl font-bold text-text-main">{stats.lowStockCount}</p>
                                    <span className="text-xs text-orange-500 font-medium">alertas</span>
                                </div>
                                <p className="text-xs text-text-muted mt-2">Menos de 3 unid.</p>
                            </div>
                        </section>

                        <section className="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
                            <button
                                onClick={() => setActiveCategory('all')}
                                className={`px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${activeCategory === 'all' ? 'bg-primary text-white shadow-md' : 'bg-white text-text-muted border border-pink-100'}`}>
                                Todas
                            </button>
                            {STOCK_CATEGORIES.map(cat => (
                                <button
                                    key={cat.id}
                                    onClick={() => setActiveCategory(cat.id)}
                                    className={`px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${activeCategory === cat.id ? 'bg-primary text-white shadow-md' : 'bg-white text-text-muted border border-pink-100 hover:bg-pink-50'}`}>
                                    {cat.name}
                                </button>
                            ))}
                        </section>

                        <section className="space-y-4 pb-20">
                            {filteredItems.length === 0 ? (
                                <p className="text-text-muted text-sm text-center py-10">No se encontraron prendas.</p>
                            ) : (
                                filteredItems.map(item => {
                                    // Calcular total para la tarjeta
                                    const totalStock = (item.stock?.s || 0) + (item.stock?.m || 0) + (item.stock?.l || 0) + (item.stock?.xl || 0);

                                    // Etiqueta de color
                                    const colorLabels = {
                                        azul: 'Azul', blanco: 'Blanco', chocolate: 'Choco',
                                        gris_petroleo: 'Gris', negro: 'Negro', verde: 'Verde'
                                    };
                                    const colorCodes = {
                                        azul: '#3b82f6', blanco: '#f3f4f6', chocolate: '#7B3F00',
                                        gris_petroleo: '#374151', negro: '#000000', verde: '#22c55e'
                                    };

                                    return (
                                        <div key={item.id} onClick={() => onItemClick(item)} className="bg-white p-3 rounded-2xl shadow-soft border border-pink-50 flex items-center gap-4 transition-transform active:scale-[0.99] cursor-pointer">
                                            <div className="h-20 w-20 shrink-0 rounded-xl overflow-hidden relative bg-gray-100 flex items-center justify-center text-primary">
                                                <span className="material-symbols-outlined !text-[32px]">checkroom</span>
                                                {item.category && (
                                                    <div className="absolute bottom-1 right-1 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm" style={{
                                                        backgroundColor: colorCodes[item.category],
                                                        color: item.category === 'blanco' ? '#000' : '#fff',
                                                        border: item.category === 'blanco' ? '1px solid #d1d5db' : 'none'
                                                    }}>
                                                        {colorLabels[item.category]}
                                                    </div>
                                                )}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-start">
                                                    <div className="flex items-center gap-2">
                                                        <div>
                                                            <h4 className="text-text-main font-bold text-base truncate pr-2">{item.name}</h4>
                                                            <p className="text-text-muted text-xs mt-0.5">{item.collection}</p>
                                                        </div>
                                                        {totalStock <= 3 && (
                                                            <span className="bg-orange-100 text-orange-600 border border-orange-200 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center shadow-sm">
                                                                <span className="material-symbols-outlined !text-[12px] mr-0.5">warning</span>
                                                                BAJO
                                                            </span>
                                                        )}
                                                    </div>
                                                    <button className="text-gray-300 hover:text-primary">
                                                        <span className="material-symbols-outlined !text-[20px]">edit</span>
                                                    </button>
                                                </div>
                                                <div className="flex items-end justify-between mt-3">
                                                    {/* Desglose de talles */}
                                                    <div className="flex gap-2 text-xs font-medium text-text-muted">
                                                        <span>S: <span className="text-text-main font-bold">{item.stock?.s || 0}</span></span>
                                                        <span className="text-pink-200">|</span>
                                                        <span>M: <span className="text-text-main font-bold">{item.stock?.m || 0}</span></span>
                                                        <span className="text-pink-200">|</span>
                                                        <span>L: <span className="text-text-main font-bold">{item.stock?.l || 0}</span></span>
                                                        <span className="text-pink-200">|</span>
                                                        <span>XL: <span className="text-text-main font-bold">{item.stock?.xl || 0}</span></span>
                                                    </div>

                                                    {/* Badge de Total */}
                                                    <div className={`flex items-center gap-1.5 px-2.5 py-1 rounded-lg ${totalStock <= 3 ? 'bg-orange-50' : 'bg-green-50'}`}>
                                                        <span className={`w-1.5 h-1.5 rounded-full ${totalStock <= 3 ? 'bg-orange-500' : 'bg-green-500'}`}></span>
                                                        <span className={`text-xs font-bold ${totalStock <= 3 ? 'text-orange-600' : 'text-green-700'}`}>{totalStock}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </section>
                    </main>
                </>
            );
        }

        // --- PANTALLA: HISTORIAL DE STOCK ---
        function StockHistoryView({ onClose, history }) {
            const formatDate = (timestamp) => {
                if (!timestamp) return 'Fecha desconocida';
                const date = timestamp.seconds ? new Date(timestamp.seconds * 1000) : new Date(timestamp);
                return date.toLocaleDateString('es-AR', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            const getActionIcon = (action) => {
                switch (action) {
                    case 'create': return 'add_circle';
                    case 'update': return 'edit';
                    case 'delete': return 'delete';
                    case 'sale': return 'shopping_cart';
                    default: return 'info';
                }
            };

            const getActionColor = (action) => {
                switch (action) {
                    case 'create': return 'text-green-600 bg-green-50';
                    case 'update': return 'text-blue-600 bg-blue-50';
                    case 'delete': return 'text-red-600 bg-red-50';
                    case 'sale': return 'text-primary bg-pink-50';
                    default: return 'text-gray-600 bg-gray-50';
                }
            };

            const getActionLabel = (action) => {
                switch (action) {
                    case 'create': return 'Creación';
                    case 'update': return 'Actualización';
                    case 'delete': return 'Eliminación';
                    case 'sale': return 'Venta';
                    default: return 'Movimiento';
                }
            };

            const colorNames = {
                azul: 'Azul', blanco: 'Blanco', chocolate: 'Chocolate',
                gris_petroleo: 'Gris Petróleo', negro: 'Negro', verde: 'Verde'
            };

            return (
                <div className="fixed inset-0 z-50 bg-background-light flex flex-col animate-slide-up">
                    <header className="flex items-center justify-between px-6 pt-8 pb-4 bg-background-light/95 backdrop-blur-md sticky top-0 z-20">
                        <button onClick={onClose} className="flex items-center justify-center w-10 h-10 rounded-full hover:bg-pink-50 text-text-main transition-colors">
                            <span className="material-symbols-outlined">arrow_back</span>
                        </button>
                        <h2 className="text-text-main text-lg font-bold tracking-tight">Historial de Stock</h2>
                        <button className="w-10 h-10 opacity-0 pointer-events-none"></button>
                    </header>

                    <main className="flex-1 overflow-y-auto px-6 py-2 space-y-4 pb-32">
                        {history.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-center">
                                <span className="material-symbols-outlined text-6xl text-gray-300 mb-4">history</span>
                                <p className="text-text-muted text-sm">No hay movimientos registrados aún</p>
                            </div>
                        ) : (
                            history.map((entry, index) => (
                                <div key={entry.id || index} className="bg-white rounded-2xl shadow-soft p-4 border border-pink-50">
                                    <div className="flex items-start gap-3">
                                        <div className={`flex items-center justify-center w-10 h-10 rounded-full ${getActionColor(entry.action)}`}>
                                            <span className="material-symbols-outlined !text-[20px]">{getActionIcon(entry.action)}</span>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className={`px-2 py-0.5 rounded-md text-xs font-bold ${getActionColor(entry.action)}`}>
                                                    {getActionLabel(entry.action)}
                                                </span>
                                                <span className="text-xs text-text-muted">{formatDate(entry.createdAt)}</span>
                                            </div>

                                            <h4 className="text-text-main font-bold text-sm">{entry.itemName}</h4>
                                            <p className="text-text-muted text-xs">
                                                {colorNames[entry.itemColor] || entry.itemColor}
                                            </p>

                                            {entry.changes && entry.changes.length > 0 && (
                                                <div className="mt-2 space-y-1">
                                                    {entry.changes.map((change, idx) => (
                                                        <div key={idx} className="flex items-center gap-2 text-xs">
                                                            <span className="font-medium text-text-main">Talle {change.size}:</span>
                                                            <span className="text-text-muted">{change.oldValue}</span>
                                                            <span className="material-symbols-outlined !text-[14px] text-primary">arrow_forward</span>
                                                            <span className={`font-bold ${change.difference > 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                                {change.newValue}
                                                            </span>
                                                            <span className={`text-xs ${change.difference > 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                                ({change.difference > 0 ? '+' : ''}{change.difference})
                                                            </span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {entry.stock && !entry.changes && (
                                                <div className="mt-2 flex gap-2 text-xs text-text-muted">
                                                    <span>S: {entry.stock.s || 0}</span>
                                                    <span>M: {entry.stock.m || 0}</span>
                                                    <span>L: {entry.stock.l || 0}</span>
                                                    <span>XL: {entry.stock.xl || 0}</span>
                                                </div>
                                            )}

                                            {entry.description && (
                                                <p className="mt-2 text-xs text-text-muted italic bg-pink-50/50 rounded-lg px-2 py-1">
                                                    "{entry.description}"
                                                </p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>
                </div>
            );
        }

        // --- PANTALLA: AÑADIR/EDITAR STOCK (RENOVADA v8.0) ---
        function AddStockScreen({ onClose, onSave, onDelete, initialData }) {
            const [name, setName] = useState(initialData?.name || '');
            const [collection, setCollection] = useState(initialData?.collection || '');

        // --- PANTALLA DE ANALYTICS ---
        function AnalyticsScreen({ onClose, transactions, stockItems }) {
            const scrollRef = useRef(null);
            const [analyticsProductType, setAnalyticsProductType] = useState('musculosa');
            const [stockProductType, setStockProductType] = useState('remera');

            const analyticsData = useMemo(() => {
                let totalIncome = 0;
                let totalExpense = 0;
                const soldByProduct = { musculosa: 0, remera: 0 };

                // Contadores para análisis
                const baseDesignCounts = {
                    aceitunas: 0, concha_de_mar: 0, libelula: 0, limon: 0,
                    medusa: 0, ojo_negro: 0, pimiento: 0, saturno_azul: 0,
                    saturno_dorado: 0, otro: 0
                };
                const baseColorCounts = {
                    azul: 0, blanco: 0, chocolate: 0,
                    gris_petroleo: 0, negro: 0, verde: 0
                };
                const baseSizeCounts = { s: 0, m: 0, l: 0, xl: 0 };
                const designCountsByProduct = {
                    musculosa: { ...baseDesignCounts },
                    remera: { ...baseDesignCounts }
                };
                const colorCountsByProduct = {
                    musculosa: { ...baseColorCounts },
                    remera: { ...baseColorCounts }
                };
                const sizeCountsByProduct = {
                    musculosa: { ...baseSizeCounts },
                    remera: { ...baseSizeCounts }
                };
                const paymentMethodCounts = { transferencia: 0, efectivo: 0, tarjeta: 0 };
                const paymentMethodIncome = { transferencia: 0, efectivo: 0, tarjeta: 0 };
                const expenseByCategory = {
                    musculosas: 0, remeras: 0, merceria: 0, logistica: 0, marketing: 0
                };

                // Análisis mensual (este mes vs mes anterior)
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();
                const previousMonth = currentMonth === 0 ? 11 : currentMonth - 1;
                const previousYear = currentMonth === 0 ? currentYear - 1 : currentYear;
                let currentMonthIncome = 0;
                let currentMonthExpense = 0;
                let previousMonthIncome = 0;
                let previousMonthExpense = 0;

                transactions.forEach(tx => {
                    const amount = parseFloat(tx.amount) || 0;
                    const txDate = tx.fullDate ? new Date(tx.fullDate) : new Date();
                    const txMonth = txDate.getMonth();
                    const txYear = txDate.getFullYear();

                    if (tx.type === 'income') {
                        totalIncome += amount;
                        if (txYear === currentYear && txMonth === currentMonth) {
                            currentMonthIncome += amount;
                        } else if (txYear === previousYear && txMonth === previousMonth) {
                            previousMonthIncome += amount;
                        }

                        // Contar método de pago para ingresos
                        const method = tx.paymentMethod || 'transferencia';
                        if (paymentMethodIncome.hasOwnProperty(method)) {
                            paymentMethodIncome[method] += amount;
                        }
                    } else {
                        totalExpense += amount;
                        if (txYear === currentYear && txMonth === currentMonth) {
                            currentMonthExpense += amount;
                        } else if (txYear === previousYear && txMonth === previousMonth) {
                            previousMonthExpense += amount;
                        }

                        // Gastos por categoría
                        if (expenseByCategory.hasOwnProperty(tx.category)) {
                            expenseByCategory[tx.category] += amount;
                        }
                    }

                    // Contar método de pago
                    const method = tx.paymentMethod || 'transferencia';
                    if (paymentMethodCounts.hasOwnProperty(method)) {
                        paymentMethodCounts[method]++;
                    }

                    // Analizar ventas por tipo de prenda
                    if (tx.category === 'online') {
                        // Soportar tanto el nuevo formato (products array) como el antiguo (campos individuales)
                        const productsArray = tx.products || (tx.productType ? [{
                            productType: tx.productType,
                            musculosaDesign: tx.musculosaDesign,
                            musculosaColor: tx.musculosaColor,
                            musculosaSize: tx.musculosaSize
                        }] : []);

                        productsArray.forEach(product => {
                            if (!product.productType || !product.musculosaDesign) return;

                            const type = product.productType === 'remera' ? 'remera' : 'musculosa';
                            soldByProduct[type]++;

                            // Diseño
                            const designCounts = designCountsByProduct[type];
                            if (designCounts && designCounts.hasOwnProperty(product.musculosaDesign)) {
                                designCounts[product.musculosaDesign]++;
                            } else if (designCounts) {
                                designCounts.otro++;
                            }

                            // Color
                            const colorCounts = colorCountsByProduct[type];
                            if (product.musculosaColor && colorCounts && colorCounts.hasOwnProperty(product.musculosaColor)) {
                                colorCounts[product.musculosaColor]++;
                            }

                            // Talle
                            const sizeCounts = sizeCountsByProduct[type];
                            if (product.musculosaSize && sizeCounts) {
                                const size = product.musculosaSize.toLowerCase();
                                if (sizeCounts.hasOwnProperty(size)) {
                                    sizeCounts[size]++;
                                }
                            }
                        });
                    } else if (tx.type === 'income') {
                        // Lógica histórica para contar ventas presenciales o antiguas
                        if (tx.category === 'musculosas') {
                            soldByProduct.musculosa += (tx.quantity ? Number(tx.quantity) : 1);
                        } else if (tx.category === 'remeras') {
                            soldByProduct.remera += (tx.quantity ? Number(tx.quantity) : 1);
                        } else if (tx.title && tx.title.toLowerCase().includes('venta')) {
                            // Fallback si la categoría no es exacta pero el título menciona "venta" y la prenda
                            const lowerTitle = tx.title.toLowerCase();
                            if (lowerTitle.includes('musculosa')) {
                                soldByProduct.musculosa += (tx.quantity ? Number(tx.quantity) : 1);
                            } else if (lowerTitle.includes('remera')) {
                                soldByProduct.remera += (tx.quantity ? Number(tx.quantity) : 1);
                            }
                        }
                    }
                });

                const balance = totalIncome - totalExpense;

                return {
                    totalIncome, totalExpense, balance,
                    soldByProduct, designCountsByProduct, colorCountsByProduct, sizeCountsByProduct,
                    paymentMethodCounts, paymentMethodIncome, expenseByCategory,
                    currentMonthIncome, currentMonthExpense,
                    previousMonthIncome, previousMonthExpense
                };
            }, [transactions]);

            // Calcular datos para gráfico de torta
            const pieData = useMemo(() => {
                const designCounts = analyticsData.designCountsByProduct?.[analyticsProductType] || {};
                const total = Object.values(designCounts).reduce((sum, val) => sum + val, 0);
                if (total === 0) return [];

                const colors = {
                    aceitunas: '#22c55e',
                    concha_de_mar: '#06b6d4',
                    libelula: '#f97316',
                    limon: '#eab308',
                    medusa: '#8b5cf6',
                    ojo_negro: '#1f2937',
                    pimiento: '#ef4444',
                    saturno_azul: '#3b82f6',
                    saturno_dorado: '#fbbf24',
                    otro: '#64748b'
                };

                const labels = {
                    aceitunas: 'Aceitunas',
                    concha_de_mar: 'Concha de mar',
                    libelula: 'Libélula',
                    limon: 'Limón',
                    medusa: 'Medusa',
                    ojo_negro: 'Ojo negro',
                    pimiento: 'Pimiento',
                    saturno_azul: 'Saturno Azul',
                    saturno_dorado: 'Saturno Dorado',
                    otro: 'Otro'
                };

                let currentAngle = 0;
                const slices = [];

                Object.entries(designCounts).forEach(([design, count]) => {
                    if (count > 0) {
                        const percentage = (count / total) * 100;
                        const angle = (count / total) * 360;
                        slices.push({
                            design,
                            label: labels[design],
                            count,
                            percentage,
                            color: colors[design],
                            startAngle: currentAngle,
                            endAngle: currentAngle + angle
                        });
                        currentAngle += angle;
                    }
                });

                return slices;
            }, [analyticsData, analyticsProductType]);

            // Función para crear path de slice de torta
            const createPieSlice = (startAngle, endAngle, radius = 80) => {
                const start = polarToCartesian(100, 100, radius, endAngle);
                const end = polarToCartesian(100, 100, radius, startAngle);
                const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
                return `M 100 100 L ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
            };

            const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
                const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
                return {
                    x: centerX + (radius * Math.cos(angleInRadians)),
                    y: centerY + (radius * Math.sin(angleInRadians))
                };
            };

            // Calcular valor del inventario
            const inventoryValue = useMemo(() => {
                console.log('📊 Recalculando inventoryValue con stockItems:', stockItems.length, 'items');
                let totalUnits = 0;
                const stockByColor = {
                    azul: 0, blanco: 0, chocolate: 0,
                    gris_petroleo: 0, negro: 0, verde: 0
                };
                const stockByColorAndSize = {};
                const productTypesByColor = {}; // Nuevo: guardar tipos de prenda por color
                const stockByColorByType = {
                    musculosa: { ...stockByColor },
                    remera: { ...stockByColor }
                };
                const stockByColorAndSizeByType = {
                    musculosa: {},
                    remera: {}
                };

                stockItems.forEach(item => {
                    console.log('  📦 Procesando item:', item.name, 'Color:', item.category);
                    const itemTotal = (item.stock?.s || 0) + (item.stock?.m || 0) +
                        (item.stock?.l || 0) + (item.stock?.xl || 0);
                    totalUnits += itemTotal;

                    // Contar por color
                    if (item.category && stockByColor.hasOwnProperty(item.category)) {
                        stockByColor[item.category] += itemTotal;

                        // Guardar desglose por talle
                        if (!stockByColorAndSize[item.category]) {
                            stockByColorAndSize[item.category] = { s: 0, m: 0, l: 0, xl: 0 };
                        }
                        stockByColorAndSize[item.category].s += (item.stock?.s || 0);
                        stockByColorAndSize[item.category].m += (item.stock?.m || 0);
                        stockByColorAndSize[item.category].l += (item.stock?.l || 0);
                        stockByColorAndSize[item.category].xl += (item.stock?.xl || 0);

                        // Guardar tipos de prenda (Musculosa/Remera)
                        if (!productTypesByColor[item.category]) {
                            productTypesByColor[item.category] = [];
                        }
                        const itemName = item.name || '';
                        const isMusculosa = itemName.toLowerCase().includes('musculosa');
                        const isRemera = itemName.toLowerCase().includes('remera') && !isMusculosa;
                        const type = isMusculosa ? 'Musculosa' : isRemera ? 'Remera' : 'Prenda';
                        if (!productTypesByColor[item.category].includes(type)) {
                            productTypesByColor[item.category].push(type);
                        }

                        // Guardar stock por color y talle por tipo de prenda
                        const typeKey = isMusculosa ? 'musculosa' : isRemera ? 'remera' : null;
                        if (typeKey && stockByColorByType[typeKey] && stockByColorByType[typeKey].hasOwnProperty(item.category)) {
                            stockByColorByType[typeKey][item.category] += itemTotal;
                            if (!stockByColorAndSizeByType[typeKey][item.category]) {
                                stockByColorAndSizeByType[typeKey][item.category] = { s: 0, m: 0, l: 0, xl: 0 };
                            }
                            stockByColorAndSizeByType[typeKey][item.category].s += (item.stock?.s || 0);
                            stockByColorAndSizeByType[typeKey][item.category].m += (item.stock?.m || 0);
                            stockByColorAndSizeByType[typeKey][item.category].l += (item.stock?.l || 0);
                            stockByColorAndSizeByType[typeKey][item.category].xl += (item.stock?.xl || 0);
                        }
                    } else {
                        console.warn('  ⚠️ Color no reconocido o faltante:', item.category);
                    }
                });

                console.log('📊 Resultado inventoryValue:', { totalUnits, stockByColor, productTypesByColor });
                const totalValue = totalUnits * 35000;
                return {
                    totalUnits,
                    totalValue,
                    stockByColor,
                    stockByColorAndSize,
                    productTypesByColor,
                    stockByColorByType,
                    stockByColorAndSizeByType
                };
            }, [stockItems]);

            return (
                <div className="fixed inset-0 z-50 bg-background-light flex flex-col animate-slide-up">
                    <header className="flex items-center justify-between px-6 pt-8 pb-4 bg-background-light/95 backdrop-blur-md sticky top-0 z-20 border-b border-pink-100">
                        <button onClick={onClose} className="flex items-center justify-center w-10 h-10 rounded-full hover:bg-pink-50 text-text-main transition-colors">
                            <span className="material-symbols-outlined">arrow_back</span>
                        </button>
                        <h2 className="text-text-main text-xl font-bold tracking-tight">Analytics</h2>
                        <div className="w-10 h-10"></div>
                    </header>

                    <main ref={scrollRef} className="flex-1 overflow-y-auto px-6 py-6 space-y-6 pb-32">
                        {/* Tarjetas principales */}
                        <section className="space-y-3">
                            <div className="bg-gradient-to-br from-green-500 to-green-600 rounded-2xl p-5 shadow-lg text-white">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-green-100 mb-1">Ingresos Totales</p>
                                        <p className="text-3xl font-bold">${analyticsData.totalIncome.toLocaleString()}</p>
                                    </div>
                                    <span className="material-symbols-outlined text-green-100 !text-[40px]">arrow_downward</span>
                                </div>
                            </div>
                            <div className="bg-gradient-to-br from-red-500 to-red-600 rounded-2xl p-5 shadow-lg text-white">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-red-100 mb-1">Egresos Totales</p>
                                        <p className="text-3xl font-bold">${analyticsData.totalExpense.toLocaleString()}</p>
                                    </div>
                                    <span className="material-symbols-outlined text-red-100 !text-[40px]">arrow_upward</span>
                                </div>
                            </div>
                            <div className="bg-gradient-to-br from-primary to-primary-dark rounded-2xl p-5 shadow-lg text-white">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-pink-100 mb-1">Balance Neto</p>
                                        <p className="text-3xl font-bold">${analyticsData.balance.toLocaleString()}</p>
                                    </div>
                                    <span className="material-symbols-outlined text-pink-100 !text-[40px]">account_balance_wallet</span>
                                </div>
                            </div>
                        </section>

                        {/* Total de prendas vendidas */}
                        <section className="bg-white rounded-2xl p-6 shadow-soft border border-pink-100">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h3 className="text-text-main font-bold text-xl">Prendas Vendidas</h3>
                                    <p className="text-text-muted text-sm mt-1">Total histórico</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mt-4">
                                <div className="flex items-center justify-between rounded-2xl bg-primary/10 px-4 py-3">
                                    <span className="text-sm font-semibold text-text-main">Musculosas</span>
                                    <span className="text-2xl font-bold text-primary">{analyticsData.soldByProduct.musculosa}</span>
                                </div>
                                <div className="flex items-center justify-between rounded-2xl bg-primary/10 px-4 py-3">
                                    <span className="text-sm font-semibold text-text-main">Remeras</span>
                                    <span className="text-2xl font-bold text-primary">{analyticsData.soldByProduct.remera}</span>
                                </div>
                            </div>
                        </section>

                        {/* Selector de producto para analytics */}
                        <section className="bg-white rounded-2xl p-4 shadow-soft border border-pink-100">
                            <div className="flex items-center justify-between">
                                <p className="text-sm font-semibold text-text-main">Filtrar analíticas por prenda</p>
                                <div className="flex items-center gap-2">
                                    <button
                                        onClick={() => setAnalyticsProductType('musculosa')}
                                        className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-colors ${analyticsProductType === 'musculosa' ? 'bg-primary text-white' : 'bg-pink-50 text-text-muted'}`}
                                    >
                                        Musculosas
                                    </button>
                                    <button
                                        onClick={() => setAnalyticsProductType('remera')}
                                        className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-colors ${analyticsProductType === 'remera' ? 'bg-primary text-white' : 'bg-pink-50 text-text-muted'}`}
                                    >
                                        Remeras

            const scrollRef = useRef(null);
            const [activeFilter, setActiveFilter] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [productTypeFilter, setProductTypeFilter] = useState('all');
            const [editingNotes, setEditingNotes] = useState(null);
            const [notesValue, setNotesValue] = useState('');

            const formatDate = (timestamp) => {
                if (!timestamp) return 'Fecha desconocida';
                const date = timestamp.seconds ? new Date(timestamp.seconds * 1000) : new Date(timestamp);
                return date.toLocaleDateString('es-AR', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            const getStatusConfig = (status) => {
                switch (status) {
                    case 'pendiente':
                        return {
                            label: 'Pendiente',
                            icon: 'schedule',
                            color: 'text-gray-600 bg-gray-50',
                            borderColor: 'border-gray-200'
                        };
                    case 'produccion':
                        return {
                            label: 'Producción',
                            icon: 'construction',
                            color: 'text-primary bg-pink-50',
                            borderColor: 'border-pink-200'
                        };
                    case 'entretela':
                        return {
                            label: 'Entre Tela',
                            icon: 'checkroom',
                            color: 'text-blue-600 bg-blue-50',
                            borderColor: 'border-blue-200'
                        };
                    case 'lavado':
                        return {
                            label: 'Lavado',
                            icon: 'water_drop',
                            color: 'text-cyan-600 bg-cyan-50',
                            borderColor: 'border-cyan-200'
                        };
                    case 'empaquetado':
                        return {
                            label: 'Empaquetado',
                            icon: 'package',
                            color: 'text-orange-600 bg-orange-50',
                            borderColor: 'border-orange-200'
                        };
                    case 'entregado':
                        return {
                            label: 'Entregado',
                            icon: 'check_circle',
                            color: 'text-green-600 bg-green-50',
                            borderColor: 'border-green-200'
                        };
                    default:
                        return {
                            label: 'Desconocido',
                            icon: 'help',
                            color: 'text-gray-600 bg-gray-50',
                            borderColor: 'border-gray-200'
                        };
                }
            };

            const getPriorityConfig = (priority) => {
                switch (priority) {
                    case 'alta':
                        return { label: 'Alta', color: 'bg-red-500' };
                    case 'media':
                        return { label: 'Media', color: 'bg-yellow-500' };
                    case 'baja':
                        return { label: 'Baja', color: 'bg-green-500' };
                    default:
                        return { label: 'Media', color: 'bg-yellow-500' };
                }
            };

            // Filtrar tareas
            const filteredTasks = useMemo(() => {
                return tasks.filter(task => {
                    // Filtro por estado
                    const statusMatch = activeFilter === 'all' || task.status === activeFilter;

                    // Filtro por tipo de prenda
                    const typeMatch = productTypeFilter === 'all' || task.productType === productTypeFilter;

                    // Búsqueda
                    const searchMatch = searchQuery === '' ||
                        task.title?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        task.description?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        task.designName?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        task.colorName?.toLowerCase().includes(searchQuery.toLowerCase());

                    return statusMatch && typeMatch && searchMatch;
                });
            }, [tasks, activeFilter, productTypeFilter, searchQuery]);

            // Agrupar tareas por estado
            const tasksByStatus = useMemo(() => {
                const groups = {
                    'pendiente': [],
                    'produccion': [],
                    'entretela': [],
                    'lavado': [],
                    'empaquetado': [],
                    'entregado': []
                };

                filteredTasks.forEach(task => {
                    if (groups[task.status]) {
                        groups[task.status].push(task);
                    }
                });

                return groups;
            }, [filteredTasks]);

            const handleStatusChange = (taskId, currentStatus) => {
                // Ciclo: pendiente -> produccion -> entretela -> lavado -> empaquetado -> entregado
                const nextStatus = {
                    'pendiente': 'produccion',
                    'produccion': 'lavado',
                    'lavado': 'entretela',
                    'entretela': 'empaquetado',
                    'empaquetado': 'entregado',
                    'entregado': 'entregado'
                };

                onUpdateStatus(taskId, nextStatus[currentStatus]);
